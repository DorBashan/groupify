<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- Green background -->
  <circle cx="50" cy="50" r="50" fill="#1db954"/>

  <g clip-path="url(#clip)">
    <!-- Spotify-style arcs (upper section) -->
    <path d="M18,31 Q50,14 82,31" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M23,43 Q50,27 77,43" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M28,55 Q50,40 72,55" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Left person (behind, subtle) -->
    <circle cx="31" cy="73" r="7" fill="white" opacity="0.65"/>
    <path d="M12,96 Q12,79 31,79 Q50,79 50,96" fill="white" opacity="0.65"/>

    <!-- Right person (behind, subtle) -->
    <circle cx="69" cy="73" r="7" fill="white" opacity="0.65"/>
    <path d="M50,96 Q50,79 69,79 Q88,79 88,96" fill="white" opacity="0.65"/>

    <!-- Center person (front, full white) -->
    <circle cx="50" cy="68" r="8.5" fill="white"/>
    <path d="M29,94 Q29,75 50,75 Q71,75 71,94" fill="white"/>
  </g>
</svg>
